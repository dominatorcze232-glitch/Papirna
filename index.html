<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Papírna – Kompletní Simulátor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121417; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        h1 { margin-bottom: 10px; font-size: 1.8rem; color: #00cec9; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        #gameContainer { position: relative; border: 3px solid #2d3436; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        canvas { display: block; background: #1a1e24; }
        
        /* Přihlašovací okno */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 12, 15, 0.92); display: flex; align-items: center; justify-content: center; z-index: 999;
            backdrop-filter: blur(5px);
        }
        .login-box { 
            background: #1e272e; padding: 35px; border-radius: 12px; border: 2px solid #00cec9; 
            text-align: center; width: 340px; box-shadow: 0 10px 25px rgba(0,206,201,0.2);
        }
        .login-box h2 { color: #00cec9; margin-bottom: 10px; }
        .login-box p { font-size: 0.9rem; color: #b2bec3; margin-bottom: 20px; }
        .login-box input { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; 
            border: 1px solid #00cec9; background: #0f171e; color: #fff; text-align: center; font-size: 1rem; outline: none;
        }
        .btn { 
            background: #00cec9; color: #0f171e; border: none; padding: 12px; border-radius: 6px; 
            cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.2s; 
        }
        .btn:hover { background: #81ecec; transform: translateY(-2px); }
        
        /* UI Panel pod hrou */
        #uiPanel { 
            margin-top: 15px; display: flex; gap: 25px; background: #1e272e; 
            padding: 12px 25px; border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .stat-item { font-size: 0.95rem; color: #b2bec3; }
        .stat-value { font-weight: bold; color: #00cec9; font-size: 1.1rem; }

        /* Nápověda ovládání */
        #controlsHint {
            margin-top: 10px; font-size: 0.85rem; color: #7f8c8d; text-align: center;
        }
    </style>

    <!-- Firebase SDK (Kompatibilní verze) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Přihlašovací okno -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2>🏭 Papírna Štětí</h2>
            <p>Zadej své jméno pro nastoupení do směny:</p>
            <input type="text" id="playerNameInput" placeholder="Tvoje Jméno..." maxlength="15" value="Operátor">
            <button class="btn" id="startBtn">Vstoupit do Továrny</button>
        </div>
    </div>

    <h1>🏭 Simulátor Papírny – Řízení Výroby</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <div id="uiPanel">
        <div class="stat-item">🌲 Dřevo: <span class="stat-value" id="uiWood">0 m³</span></div>
        <div class="stat-item">📄 Papír: <span class="stat-value" id="uiPaper">0 t</span></div>
        <div class="stat-item">💰 Účet Továrny: <span class="stat-value" id="uiMoney">0 Kč</span></div>
        <div class="stat-item">👤 Tvoje Role: <span class="stat-value" id="uiMyRole">Pracovník</span></div>
    </div>

    <div id="controlsHint">
        Pohyb: <b>W, A, S, D</b> nebo <b>Šipky</b> | Akce na pracovišti: Přijď k budově a stiskni <b>MEZERNÍK</b>
    </div>

    <script>
        // Config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDQggkn9Akjw9X2rrTT2h2NlfBwZPHYjPU",
            authDomain: "papirna.firebaseapp.com",
            projectId: "papirna",
            storageBucket: "papirna.firebasestorage.app",
            messagingSenderId: "652128293424",
            appId: "1:652128293424:web:9d8a290479b6d8cae293f5",
            databaseURL: "https://papirna-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Inicializace
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = 'player_' + Math.floor(Math.random() * 100000);
        let myName = "Hráč";
        let myRole = "worker";
        let otherPlayers = {};
        let sharedFactoryData = { wood: 100, paper: 0, money: 50000 };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const player = { x: 450, y: 400, size: 14, speed: 4.5 };
        const keys = {};

        // Budovy v továrně
        const stations = [
            { id: 'woodDepot', name: 'Sklad Dřeva', x: 50, y: 50, w: 150, h: 100, color: '#e67e22', action: 'Koupit Dřevo (Vedoucí)' },
            { id: 'pulpMill', name: 'Várna Buničiny', x: 250, y: 50, w: 160, h: 100, color: '#e74c3c', action: 'Zpracovat Dřevo na Kaši' },
            { id: 'paperMachine', name: 'Papírenský Stroj', x: 470, y: 50, w: 180, h: 100, color: '#3498db', action: 'Vyrobit Papír' },
            { id: 'paperStorage', name: 'Sklad a Expedice', x: 700, y: 50, w: 150, h: 100, color: '#2ecc71', action: 'Prodat Papír' }
        ];

        let pulpInProcess = 0; // Mezikrok výroby

        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.code === 'Space') handleSpaceAction();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        // PŘIHLÁŠENÍ DO HRY
        document.getElementById('startBtn').onclick = function() {
            const input = document.getElementById('playerNameInput').value.trim();
            if (input.length > 0) myName = input;
            
            document.getElementById('loginOverlay').style.display = 'none';

            // Zjištění role a načtení hráčů
            const playersRef = db.ref('players');
            playersRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                if (Object.keys(data).length === 0) {
                    myRole = 'leader'; // První hráč je Vedoucí
                }

                // Registrace hráče
                const myRef = db.ref('players/' + myId);
                myRef.set({ id: myId, name: myName, x: player.x, y: player.y, role: myRole });
                myRef.onDisconnect().remove();

                document.getElementById('uiMyRole').innerText = myRole === 'leader' ? 'Vedoucí Výroby' : 'Pracovník Operátor';
            });

            // Synchronizace hráčů
            playersRef.on('value', snapshot => { otherPlayers = snapshot.val() || {}; });

            // Synchronizace dat továrny (Sklady a Peníze)
            const factoryRef = db.ref('factory');
            factoryRef.on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    sharedFactoryData = data;
                    updateUI();
                } else {
                    // Inicializace továrny, pokud ještě neexistuje
                    factoryRef.set(sharedFactoryData);
                }
            });
        };

        function updateUI() {
            document.getElementById('uiWood').innerText = sharedFactoryData.wood + ' m³';
            document.getElementById('uiPaper').innerText = sharedFactoryData.paper + ' t';
            document.getElementById('uiMoney').innerText = sharedFactoryData.money.toLocaleString() + ' Kč';
        }

        // AKCE PŘI STISKU MEZERNÍKU U STROJE
        function handleSpaceAction() {
            stations.forEach(st => {
                // Kontrola zda hráč stojí blízko stanice
                if (player.x > st.x - 20 && player.x < st.x + st.w + 20 &&
                    player.y > st.y - 20 && player.y < st.y + st.h + 20) {

                    if (st.id === 'woodDepot') {
                        if (myRole === 'leader') {
                            if (sharedFactoryData.money >= 10000) {
                                db.ref('factory').update({
                                    wood: sharedFactoryData.wood + 50,
                                    money: sharedFactoryData.money - 10000
                                });
                            } else {
                                alert("Nedostatek financí na účtu továrny!");
                            }
                        } else {
                            alert("Nakupovat dřevo může pouze Vedoucí Výroby!");
                        }
                    } 
                    else if (st.id === 'pulpMill') {
                        if (sharedFactoryData.wood >= 10) {
                            db.ref('factory').update({ wood: sharedFactoryData.wood - 10 });
                            pulpInProcess += 10;
                            alert("Vytvořil jsi buničitou kaši (10 jednotek)! Jdi k Papírenskému stroji.");
                        } else {
                            alert("Chybí dřevo ve skladu!");
                        }
                    } 
                    else if (st.id === 'paperMachine') {
                        if (pulpInProcess >= 10) {
                            pulpInProcess -= 10;
                            db.ref('factory').update({ paper: sharedFactoryData.paper + 5 });
                            alert("Papírenský stroj vyrobil 5 tun papíru!");
                        } else {
                            alert("Nejprve musíš ve Várně připravit buničinu!");
                        }
                    } 
                    else if (st.id === 'paperStorage') {
                        if (sharedFactoryData.paper >= 5) {
                            db.ref('factory').update({
                                paper: sharedFactoryData.paper - 5,
                                money: sharedFactoryData.money + 18000
                            });
                        } else {
                            alert("Ve skladu není žádný papír k expedici!");
                        }
                    }
                }
            });
        }

        // HYBNOST A LOGIKA
        function update() {
            let moved = false;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) { player.y = Math.max(30, player.y - player.speed); moved = true; }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) { player.y = Math.min(canvas.height - 30, player.y + player.speed); moved = true; }
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) { player.x = Math.max(30, player.x - player.speed); moved = true; }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) { player.x = Math.min(canvas.width - 30, player.x + player.speed); moved = true; }

            if (moved) {
                db.ref('players/' + myId).update({ x: player.x, y: player.y });
            }
        }

        // VYKRESLOVÁNÍ GRAFIKY
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Podlaha Továrny
            ctx.fillStyle = '#252a34';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Zóny / Cesty
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(20, 180, 860, 20);

            // Vykreslení Stanic a Strojů
            stations.forEach(st => {
                // Budova
                ctx.fillStyle = st.color;
                ctx.fillRect(st.x, st.y, st.w, st.h);

                // Detail / Stín
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(st.x, st.y + st.h - 15, st.w, 15);

                // Popis Budovy
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px sans-serif';
                ctx.fillText(st.name, st.x + 10, st.y + 25);

                // Nápověda akce
                ctx.font = '10px sans-serif';
                ctx.fillStyle = '#ddd';
                ctx.fillText("[MEZERNÍK]", st.x + 10, st.y + 50);
                ctx.fillText(st.action, st.x + 10, st.y + 70);
            });

            // Vykreslení mezikroku (Buničina u hráče)
            if (pulpInProcess > 0) {
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText(`Neseš buničinu: ${pulpInProcess}`, player.x - 35, player.y + 30);
            }

            // Vykreslení Všech Hráčů
            Object.values(otherPlayers).forEach(p => {
                // Barva postavičky podle role
                ctx.fillStyle = p.role === 'leader' ? '#00cec9' : '#e67e22';
                
                // Tělo hráče
                ctx.beginPath();
                ctx.arc(p.x, p.y, player.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                // Jméno
                ctx.fillStyle = '#fff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(p.name + (p.role === 'leader' ? ' (Vedoucí)' : ''), p.x, p.y - 20);
                ctx.textAlign = 'start';
            });
        }

        // Hlavní Smyčka
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
