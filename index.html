<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Papírna – Multiplayer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #gameContainer { position: relative; border: 3px solid #444; border-radius: 8px; overflow: hidden; }
        canvas { display: block; background: #1e1e1e; }
        
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .login-box { background: #1e272e; padding: 30px; border-radius: 8px; border: 2px solid #00cec9; text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 10px; margin: 15px 0; border-radius: 4px; border: 1px solid #00cec9; background: #0f171e; color: #fff; text-align: center; font-size: 1rem; }
        .btn { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: #27ae60; }
        
        #uiPanel { margin-top: 10px; display: flex; gap: 20px; background: #1e1e1e; padding: 10px 20px; border-radius: 5px; border: 1px solid #333; }
        .stat-value { font-weight: bold; color: #00cec9; }
    </style>

    <!-- Načtení Firebase kompatibilní verze (Funguje v běžném HTML bez chyb) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Přihlašovací okno -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #00cec9;">🏭 Vstup do Papírny</h2>
            <p style="font-size: 0.85rem; color: #ccc; margin-top: 5px;">Zadej své jméno pro přihlášení:</p>
            <input type="text" id="playerNameInput" placeholder="Tvoje Jméno..." maxlength="15" value="Hráč 1">
            <button class="btn" id="startBtn">Vstoupit do hry</button>
        </div>
    </div>

    <h1>2D Papírna – Multiplayer</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="850" height="480"></canvas>
    </div>

    <div id="uiPanel">
        <div>Dřevo: <span class="stat-value" id="uiWood">100 m³</span></div>
        <div>Papír: <span class="stat-value" id="uiPaper">0 ks</span></div>
        <div>Finance: <span class="stat-value" id="uiMoney">60 000 Kč</span></div>
        <div>Tvoje Role: <span class="stat-value" id="uiMyRole">Pracovník</span></div>
    </div>

    <script>
        // Config s URL databáze
        const firebaseConfig = {
            apiKey: "AIzaSyDQggkn9Akjw9X2rrTT2h2NlfBwZPHYjPU",
            authDomain: "papirna.firebaseapp.com",
            projectId: "papirna",
            storageBucket: "papirna.firebasestorage.app",
            messagingSenderId: "652128293424",
            appId: "1:652128293424:web:9d8a290479b6d8cae293f5",
            databaseURL: "https://papirna-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Inicializace
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = 'player_' + Math.floor(Math.random() * 100000);
        let myName = "Hráč";
        let myRole = "worker";
        let otherPlayers = {};

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const player = { x: 100, y: 250, size: 20, speed: 4 };
        const keys = {};

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // OŠETŘENÍ TLAČÍTKA PŘIHLÁŠENÍ
        document.getElementById('startBtn').onclick = function() {
            const input = document.getElementById('playerNameInput').value.trim();
            if (input.length > 0) myName = input;
            
            document.getElementById('loginOverlay').style.display = 'none';

            // Zjištění role a první připojení
            const playersRef = db.ref('players');
            playersRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                const playerKeys = Object.keys(data);
                
                // První přihlášený je Vedoucí
                if (playerKeys.length === 0) {
                    myRole = 'leader';
                }

                // Uložení hráče do Firebase
                const myRef = db.ref('players/' + myId);
                myRef.set({
                    id: myId,
                    name: myName,
                    x: player.x,
                    y: player.y,
                    role: myRole
                });
                myRef.onDisconnect().remove();

                document.getElementById('uiMyRole').innerText = myRole === 'leader' ? 'Vedoucí Výroby' : 'Pracovník';
            });

            // Sledování ostatních hráčů
            playersRef.on('value', (snapshot) => {
                otherPlayers = snapshot.val() || {};
            });
        };

        function update() {
            let moved = false;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) { player.y -= player.speed; moved = true; }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) { player.y += player.speed; moved = true; }
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) { player.x -= player.speed; moved = true; }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) { player.x += player.speed; moved = true; }

            if (moved) {
                db.ref('players/' + myId).update({ x: player.x, y: player.y });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vykreslení strojů
            ctx.fillStyle = '#2d3436';
            ctx.fillRect(50, 50, 120, 80);
            ctx.fillRect(220, 50, 140, 80);
            ctx.fillRect(400, 50, 120, 80);

            ctx.fillStyle = '#fff';
            ctx.fillText('Várna', 90, 95);
            ctx.fillText('Papírenský Stroj', 245, 95);
            ctx.fillText('Sušička', 440, 95);

            // Vykreslení hráčů
            Object.values(otherPlayers).forEach(p => {
                ctx.fillStyle = p.role === 'leader' ? '#00cec9' : '#e67e22';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '12px sans-serif';
                ctx.fillText(p.name, p.x - 15, p.y - 18);
            });
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
